<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 15px;
      margin: 0;
      text-align: center;
      background-color: #f9f9fb;
      color: #333;
    }
    h3 { margin-top: 0; margin-bottom: 10px; font-size: 24px; }
    button {
      width: 100%;
      padding: 10px;
      background-color: #E32200;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      background-color: #ced4da;
      color: #6c757d;
      cursor: not-allowed;
    }
    .status-msg {
      font-size: 13px;
      margin-top: 10px;
      line-height: 1.4;
      white-space: pre-line;
    }
    .lockdown { color: #d9381e; font-weight: bold; }
    .active { color: #00875a; font-weight: bold; }
  </style>
</head>
<body>
  <h3>de-Algorithm</h3>
  <button id="passBtn" disabled>Loading...</button>
  <div id="status" class="status-msg">Checking status...</div>

  <script src="popup.js"></script>
</body>
</html>
